# Line Follower PID Simulator — nginx site config.
#
# Serves the built React SPA as static files and reverse-proxies /api to the
# FastAPI (uvicorn) service. Single origin, so no CORS needed in production.
#
# HTTP only for now. SSL + real domain to be added later (see TLS block at the
# bottom, commented out). The admin area (/admin page + /api/admin endpoints) is
# protected with HTTP Basic Auth.
#
# Prereqs on the server:
#   - Build the frontend:   cd /opt/robot/pidsim/frontend && npm run build
#   - Run the backend:      systemd service pidsim-api on 127.0.0.1:8000
#                           (see deploy/pidsim-api.service)
#   - Create the admin password file (user: matamoe):
#       sudo apt-get install -y apache2-utils      # provides htpasswd
#       sudo htpasswd -c /opt/robot/pidsim/deploy/.htpasswd matamoe
#       # when prompted, enter the password (e.g. matamoe) — change before exposing publicly
#       sudo chown matamoe:matamoe /opt/robot/pidsim/deploy/.htpasswd
#       sudo chmod 640 /opt/robot/pidsim/deploy/.htpasswd

server {
    listen 80;
    # server_name _ matches any host. Replace with e.g. pidsim.matamoe.org when
    # the domain is ready, then add the TLS server block below.
    server_name _;

    # Deploy root: app lives at /opt/robot/pidsim; nginx serves the built SPA.
    root /opt/robot/pidsim/frontend/dist;
    index index.html;

    # Allow course/robot uploads of a reasonable size (SVG tracks, JSON configs).
    client_max_body_size 25m;

    # --- Admin API: deploy / test / uploads — auth required ----------------
    location /api/admin/ {
        auth_basic           "Matamoe Admin";
        auth_basic_user_file /opt/robot/pidsim/deploy/.htpasswd;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Deploy/test actions can run long and stream output.
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # --- Public API -> FastAPI/uvicorn -------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Admin page (SPA route) — also behind Basic Auth -------------------
    # Protects the HTML entry point; real enforcement is on /api/admin above.
    location /admin {
        auth_basic           "Matamoe Admin";
        auth_basic_user_file /opt/robot/pidsim/deploy/.htpasswd;
        try_files $uri /index.html;
    }

    # --- SPA fallback: serve index.html for client-side routes -------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- TLS (enable later, once the domain + cert exist) ----------------------
# Recommended: run `sudo certbot --nginx -d pidsim.matamoe.org`, which will
# rewrite this file to add the 443 server block and an HTTP->HTTPS redirect.
#
# server {
#     listen 443 ssl http2;
#     server_name pidsim.matamoe.org;
#     ssl_certificate     /etc/letsencrypt/live/pidsim.matamoe.org/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/pidsim.matamoe.org/privkey.pem;
#     # ... same root / location blocks as above ...
# }
