# Line Follower PID Simulator — nginx site config.
#
# Serves the built React SPA as static files and reverse-proxies /api to the
# FastAPI (uvicorn) service. Single origin, so no CORS needed in production.
#
# Build the frontend first:   cd frontend && npm run build   -> frontend/dist
# Run the backend:            uvicorn app.main:app --host 127.0.0.1 --port 8000
#
# Then point `root` below at the absolute path of frontend/dist on the server.

server {
    listen 80;
    server_name _;

    # Adjust to the deployed location of frontend/dist
    root /var/www/lfr-pid-simulator;
    index index.html;

    # API -> FastAPI/uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
