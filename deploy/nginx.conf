# Line Follower PID Simulator — nginx site config.
#
# Serves the built React SPA as static files and reverse-proxies /api to the
# FastAPI service (gunicorn + uvicorn workers) on 127.0.0.1:8700.
# Single origin, so no CORS needed in production.
#
# HTTP only for now. SSL + real domain to be added later (TLS block stubbed at
# the bottom). The app's service user:group on the server is matamoe:matamoe
# (see deploy/pidsim-api.service).
#
# The /admin page and /api/admin/* endpoints are locked behind HTTP Basic Auth
# (user: admin). They can pull/install/test/restart the app and accept uploads.
# Create the password file once on the server (PIN goes here):
#   printf "admin:$(openssl passwd -apr1 6767)\n" | sudo tee /opt/robot/pidsim/deploy/.htpasswd
#   sudo chown matamoe:matamoe /opt/robot/pidsim/deploy/.htpasswd && sudo chmod 640 /opt/robot/pidsim/deploy/.htpasswd
# NOTE: on plain HTTP the PIN is sent unencrypted — add SSL before exposing
# this widely, and optionally also restrict by IP (see the allow/deny block).

server {
    listen 80;
    server_name pidsimulator.matamoehub.co.nz;

    # Deploy root: app lives at /opt/robot/pidsim; nginx serves the built SPA.
    root /opt/robot/pidsim/frontend/dist;
    index index.html;

    # Allow course/robot uploads of a reasonable size (SVG tracks, JSON configs).
    client_max_body_size 25m;

    # --- Admin API: deploy / test / uploads (locked) -----------------------
    location /api/admin/ {
        auth_basic           "Matamoe Admin";
        auth_basic_user_file /opt/robot/pidsim/deploy/.htpasswd;

        # Optionally also restrict by source IP (uncomment to add):
        #   allow 192.168.0.0/16;   # LAN
        #   allow 10.0.0.0/8;       # VPN
        #   deny  all;

        proxy_pass http://127.0.0.1:8700;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Deploy/test actions can run long and stream output.
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # --- Public API -> FastAPI ---------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8700;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Admin page (SPA route) — locked so the browser prompts on load,
    #     then reuses the same credentials for /api/admin/* fetches ----------
    location /admin {
        auth_basic           "Matamoe Admin";
        auth_basic_user_file /opt/robot/pidsim/deploy/.htpasswd;
        try_files $uri /index.html;
    }

    # --- SPA fallback: serve index.html for client-side routes (public) -----
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- TLS (enable later, once DNS resolves to this host) --------------------
# Run: sudo certbot --nginx -d pidsimulator.matamoehub.co.nz
# certbot rewrites this file to add the 443 server block + an HTTP->HTTPS
# redirect, and sets up auto-renewal. DNS must already point at this server.
